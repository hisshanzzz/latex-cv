<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher — SpellQuest</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/english-pro-hub-logo.png" />
</head>
<body>
  <div class="bg-mesh" aria-hidden="true">
    <img class="bg-photo bg-photo-a" src="assets/spellquest-trophy.png" alt="" />
    <div class="bg-veil"></div>
  </div>
  <header class="topbar">
    <a class="brand" href="index.html">
      <img src="assets/english-pro-hub-logo.png" alt="" class="brand-logo" width="44" height="44" />
      <span class="brand-text"><strong>SpellQuest</strong><small>Teacher</small></span>
    </a>
  </header>
  <main class="panel" style="max-width:760px;margin:1.5rem auto;">
    <h2>Teacher tools</h2>
    <p class="panel-sub">Needs Netlify deploy + <code>TEACHER_PIN</code> env var. See <a href="setup.html">Setup</a>.</p>

    <label class="voice-row">PIN
      <input id="pin" type="password" placeholder="Teacher PIN" style="flex:1;padding:0.7rem;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.35);color:var(--ink);" />
    </label>
    <div class="cta-row">
      <button type="button" class="primary-btn" id="btn-load">Load boards</button>
    </div>
    <pre id="out" class="teacher-out">Boards will appear here…</pre>

    <h3>Create classroom code</h3>
    <label class="voice-row">Code <input id="code" placeholder="HUB2026" /></label>
    <label class="voice-row">Name <input id="cname" placeholder="English Pro Hub Saturday" /></label>
    <label class="voice-row">Track
      <select id="ctrack">
        <option value="starter">Starter</option>
        <option value="builder" selected>Builder</option>
        <option value="challenger">Challenger</option>
        <option value="elite">Elite</option>
        <option value="open">Open</option>
      </select>
    </label>
    <button type="button" class="secondary-btn" id="btn-room">Create classroom</button>
    <p id="room-msg" class="panel-sub"></p>
    <p class="panel-sub" style="margin-top:1.5rem;">
      Need help? WhatsApp <a href="https://wa.me/94774932692">+94 77 493 2692</a> ·
      <a href="mailto:englishprohubclass@gmail.com">englishprohubclass@gmail.com</a>
    </p>
  </main>
  <script src="js/api.js"></script>
  <script>
    const out = document.getElementById("out");
    document.getElementById("btn-load").onclick = async () => {
      const pin = document.getElementById("pin").value;
      out.textContent = "Loading…";
      const res = await SpellQuestAPI.teacherOverview(pin);
      out.textContent = JSON.stringify(res.data, null, 2);
    };
    document.getElementById("btn-room").onclick = async () => {
      const pin = document.getElementById("pin").value;
      const res = await SpellQuestAPI.createClassroom(pin, {
        code: document.getElementById("code").value,
        name: document.getElementById("cname").value,
        track: document.getElementById("ctrack").value,
      });
      document.getElementById("room-msg").textContent = res.ok
        ? "Classroom saved: " + res.data.classroom.code
        : (res.data.error || "Failed");
    };
  </script>
</body>
</html>
